<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="800" rx="120" fill="#121212"/>
  
  <!-- Outer glow circle -->
  <circle cx="400" cy="400" r="320" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.2"/>
  
  <!-- Main document icon -->
  <g transform="translate(280, 200)">
    <!-- Document body with gradient -->
    <defs>
      <linearGradient id="docGradient" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#1e1e1e;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#232323;stop-opacity:1" />
      </linearGradient>
      
      <!-- Glow effect for sparkles -->
      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    
    <!-- Main document rectangle -->
    <rect x="0" y="0" width="240" height="320" rx="20" fill="url(#docGradient)" stroke="#3b82f6" stroke-width="4"/>
    
    <!-- Folded corner -->
    <path d="M 180 0 L 180 60 L 240 60 Z" fill="#121212" stroke="#3b82f6" stroke-width="4" stroke-linejoin="round"/>
    <line x1="180" y1="0" x2="240" y2="60" stroke="#2e2e2e" stroke-width="2"/>
    
    <!-- Code brackets - top -->
    <text x="30" y="100" font-family="monospace" font-size="48" fill="#10b981" font-weight="bold">&lt;/&gt;</text>
    
    <!-- Code lines with gradient -->
    <line x1="100" y1="100" x2="210" y2="100" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
    <line x1="100" y1="130" x2="190" y2="130" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
    <line x1="100" y1="160" x2="210" y2="160" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
    <line x1="30" y1="200" x2="180" y2="200" stroke="#2e2e2e" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    <line x1="30" y1="230" x2="210" y2="230" stroke="#2e2e2e" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    
    <!-- AI Sparkle effect - bottom right -->
    <g transform="translate(190, 270)" filter="url(#glow)">
      <!-- Center star burst -->
      <circle cx="0" cy="0" r="18" fill="#10b981"/>
      
      <!-- Four main rays -->
      <line x1="0" y1="-40" x2="0" y2="-22" stroke="#10b981" stroke-width="8" stroke-linecap="round"/>
      <line x1="0" y1="40" x2="0" y2="22" stroke="#10b981" stroke-width="8" stroke-linecap="round"/>
      <line x1="-40" y1="0" x2="-22" y2="0" stroke="#10b981" stroke-width="8" stroke-linecap="round"/>
      <line x1="40" y1="0" x2="22" y2="0" stroke="#10b981" stroke-width="8" stroke-linecap="round"/>
      
      <!-- Diagonal rays -->
      <line x1="-28" y1="-28" x2="-16" y2="-16" stroke="#34d399" stroke-width="6" stroke-linecap="round"/>
      <line x1="28" y1="28" x2="16" y2="16" stroke="#34d399" stroke-width="6" stroke-linecap="round"/>
      <line x1="28" y1="-28" x2="16" y2="-16" stroke="#34d399" stroke-width="6" stroke-linecap="round"/>
      <line x1="-28" y1="28" x2="-16" y2="16" stroke="#34d399" stroke-width="6" stroke-linecap="round"/>
      
      <!-- Small accent dots -->
      <circle cx="-55" cy="-35" r="6" fill="#3b82f6" opacity="0.8"/>
      <circle cx="50" cy="-45" r="5" fill="#3b82f6" opacity="0.6"/>
      <circle cx="48" cy="40" r="4" fill="#10b981" opacity="0.8"/>
    </g>
  </g>
  
  <!-- Subtle corner accents -->
  <circle cx="100" cy="100" r="4" fill="#3b82f6" opacity="0.4"/>
  <circle cx="700" cy="100" r="4" fill="#10b981" opacity="0.4"/>
  <circle cx="100" cy="700" r="4" fill="#10b981" opacity="0.4"/>
  <circle cx="700" cy="700" r="4" fill="#3b82f6" opacity="0.4"/>
</svg>