services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chunk-service:
    build: ./services/chunk-service
    ports:
      - "8001:8000"
    env_file: ./services/chunk-service/.env
    depends_on:
      redis:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 8.8.4.4

  embed-service:
    build: ./services/embed-service
    ports:
      - "8002:8000"
    env_file: ./services/embed-service/.env

    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure
    dns:
      - 8.8.8.8
      - 8.8.4.4

  embed-worker:
    build: ./services/embed-service
    env_file: ./services/embed-service/.env
    depends_on:
      redis:
        condition: service_healthy
    command: ["python", "-m", "app.worker"]
    restart: on-failure
    dns:
      - 8.8.8.8
      - 8.8.4.4
  rag-service:
    build: ./services/rag-service
    ports:
      - "8003:8000"
    env_file: ./services/rag-service/.env
    depends_on:
      - redis
      - embed-service:
          condition: service_started
    restart: on-failure
    dns:
      - 8.8.8.8
      - 8.8.4.4
