name: rag-service CI

on:
  push:
    paths:
      - "services/rag-service/**"
  pull_request:
    paths:
      - "services/rag-service/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: services/rag-service
        run: uv pip install --system -r requirements.txt

      - name: Run tests
        working-directory: services/rag-service
        env:
          GEMINI_API_KEY: test-key
          VOYAGE_API_KEY: test-key
          PINECONE_API_KEY: test-key
          PINECONE_INDEX_NAME: promptdoc
          PINECONE_HOST: https://test.pinecone.io
          INTERNAL_API_SECRET: test-secret
          MAX_RETRIEVAL_RESULTS: 8
          MAX_CONTEXT_CHUNKS: 12
          MAX_CRITIQUE_LOOPS: 2
          TEMPERATURE: "0.2"
          BATCH_SIZE: 32
        run: pytest tests/ -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: services/rag-service
        run: docker build -t rag-service:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d \
            --name rag-service \
            -p 8003:8000 \
            -e GEMINI_API_KEY=test-key \
            -e VOYAGE_API_KEY=test-key \
            -e PINECONE_API_KEY=test-key \
            -e PINECONE_INDEX_NAME=promptdoc \
            -e PINECONE_HOST=https://test.pinecone.io \
            -e INTERNAL_API_SECRET=test-secret \
            -e MAX_RETRIEVAL_RESULTS=8 \
            -e MAX_CONTEXT_CHUNKS=12 \
            -e MAX_CRITIQUE_LOOPS=2 \
            -e TEMPERATURE=0.2 \
            -e BATCH_SIZE=32 \
            rag-service:${{ github.sha }}
          sleep 4
          curl --fail http://localhost:8003/health
          docker stop rag-service
