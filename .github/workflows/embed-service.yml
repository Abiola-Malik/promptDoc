name: embed-service CI

on:
  push:
    paths:
      - "services/embed-service/**"
  pull_request:
    paths:
      - "services/embed-service/**"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/embed-service/requirements.txt

      - name: Install dependencies
        working-directory: services/embed-service
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: services/embed-service
        env:
          REDIS_URL: redis://localhost:6379
          INTERNAL_API_SECRET: test-secret
          VOYAGE_API_KEY: test-key
          PINECONE_API_KEY: test-key
          PINECONE_INDEX_NAME: promptdoc
          PINECONE_HOST: https://test.pinecone.io
          BATCH_SIZE: 32
          WORKER_SLEEP_SECONDS: 1
        run: pytest tests/ -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: services/embed-service
        run: docker build -t embed-service:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d \
            --name embed-service \
            -p 8002:8000 \
            -e REDIS_URL=redis://localhost:6379 \
            -e INTERNAL_API_SECRET=test-secret \
            -e VOYAGE_API_KEY=test-key \
            -e PINECONE_API_KEY=test-key \
            -e PINECONE_INDEX_NAME=promptdoc \
            -e PINECONE_HOST=https://test.pinecone.io \
            embed-service:${{ github.sha }}
          sleep 3
          curl --fail http://localhost:8002/health
          docker stop embed-service
