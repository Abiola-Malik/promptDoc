name: chunk-service CI

on:
  push:
    paths:
      - "services/chunk-service/**"
  pull_request:
    paths:
      - "services/chunk-service/**"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/chunk-service/requirements.txt

      - name: Install dependencies
        working-directory: services/chunk-service
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: services/chunk-service
        env:
          REDIS_URL: redis://localhost:6379
          INTERNAL_API_SECRET: test-secret
          MAX_CHUNK_SIZE: 1500
          MIN_CHUNK_SIZE: 50
          MAX_FILE_SIZE_KB: 500
        run: pytest tests/ -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: services/chunk-service
        run: docker build -t chunk-service:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d \
            --name chunk-service \
            -p 8001:8000 \
            -e REDIS_URL=redis://localhost:6379 \
            -e INTERNAL_API_SECRET=test-secret \
            chunk-service:${{ github.sha }}
          sleep 3
          curl --fail http://localhost:8001/health
          docker stop chunk-service
