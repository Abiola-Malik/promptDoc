<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#121212;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#121212;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Shadow for text -->
    <filter id="textShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#3b82f6" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#3b82f6" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#3b82f6" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#3b82f6" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#3b82f6" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#10b981" stroke-width="1"/>
  </g>
  
  <!-- Left side - Icon and branding -->
  <g transform="translate(100, 165)">
    <!-- Document icon -->
    <g>
      <rect x="0" y="0" width="180" height="240" rx="16" fill="#1e1e1e" stroke="#3b82f6" stroke-width="4"/>
      
      <!-- Folded corner -->
      <path d="M 135 0 L 135 45 L 180 45 Z" fill="#121212" stroke="#3b82f6" stroke-width="4" stroke-linejoin="round"/>
      <line x1="135" y1="0" x2="180" y2="45" stroke="#2e2e2e" stroke-width="2"/>
      
      <!-- Code bracket -->
      <text x="20" y="80" font-family="monospace" font-size="42" fill="#10b981" font-weight="bold">&lt;/&gt;</text>
      
      <!-- Code lines -->
      <line x1="75" y1="75" x2="160" y2="75" stroke="#3b82f6" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
      <line x1="75" y1="100" x2="145" y2="100" stroke="#3b82f6" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
      <line x1="75" y1="125" x2="160" y2="125" stroke="#3b82f6" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
      <line x1="20" y1="160" x2="140" y2="160" stroke="#2e2e2e" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
      <line x1="20" y1="185" x2="160" y2="185" stroke="#2e2e2e" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
      
      <!-- AI Sparkle -->
      <g transform="translate(145, 205)" filter="url(#glow)">
        <circle cx="0" cy="0" r="14" fill="#10b981"/>
        <line x1="0" y1="-30" x2="0" y2="-18" stroke="#10b981" stroke-width="6" stroke-linecap="round"/>
        <line x1="0" y1="30" x2="0" y2="18" stroke="#10b981" stroke-width="6" stroke-linecap="round"/>
        <line x1="-30" y1="0" x2="-18" y2="0" stroke="#10b981" stroke-width="6" stroke-linecap="round"/>
        <line x1="30" y1="0" x2="18" y2="0" stroke="#10b981" stroke-width="6" stroke-linecap="round"/>
        <line x1="-22" y1="-22" x2="-13" y2="-13" stroke="#34d399" stroke-width="5" stroke-linecap="round"/>
        <line x1="22" y1="22" x2="13" y2="13" stroke="#34d399" stroke-width="5" stroke-linecap="round"/>
        <line x1="22" y1="-22" x2="13" y2="-13" stroke="#34d399" stroke-width="5" stroke-linecap="round"/>
        <line x1="-22" y1="22" x2="-13" y2="13" stroke="#34d399" stroke-width="5" stroke-linecap="round"/>
      </g>
    </g>
  </g>
  
  <!-- Right side - Text content -->
  <g transform="translate(380, 0)">
    <!-- Main heading -->
    <text x="0" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="84" font-weight="800" fill="url(#textGradient)" filter="url(#textShadow)">
      PromptDoc
    </text>
    
    <!-- Tagline -->
    <text x="0" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="500" fill="#e0e0e0" opacity="0.9">
      AI-Powered Code Documentation
    </text>
    
    <!-- Features -->
    <g transform="translate(0, 350)">
      <!-- Feature 1 -->
      <g>
        <circle cx="8" cy="-8" r="6" fill="#10b981"/>
        <text x="30" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#a1a1a1">
          Generate docs instantly
        </text>
      </g>
      
      <!-- Feature 2 -->
      <g transform="translate(0, 50)">
        <circle cx="8" cy="-8" r="6" fill="#3b82f6"/>
        <text x="30" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#a1a1a1">
          Smart code analysis
        </text>
      </g>
      
      <!-- Feature 3 -->
      <g transform="translate(0, 100)">
        <circle cx="8" cy="-8" r="6" fill="#10b981"/>
        <text x="30" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#a1a1a1">
          Interactive chat interface
        </text>
      </g>
    </g>
  </g>
  
  <!-- Decorative elements -->
  <g opacity="0.6" filter="url(#glow)">
    <circle cx="1050" cy="100" r="8" fill="#3b82f6"/>
    <circle cx="1100" cy="520" r="6" fill="#10b981"/>
    <circle cx="950" cy="550" r="5" fill="#3b82f6"/>
  </g>
  
  <!-- Bottom accent line -->
  <rect x="100" y="610" width="1000" height="3" fill="url(#textGradient)" opacity="0.5" rx="1.5"/>
</svg>